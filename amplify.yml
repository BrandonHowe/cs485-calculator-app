version: 1
applications:
  - appRoot: client
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npx vite build --config client/vite.config.js
      artifacts:
        baseDirectory: ../dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
